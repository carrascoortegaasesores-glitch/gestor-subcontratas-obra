<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestor de Subcontratas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
button{cursor:pointer;font-family:inherit;font-size:13px;border-radius:8px;border:1px solid #d0d0cc;background:#fff;color:#1a1a1a;padding:7px 13px;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
button:hover{background:#f0f0ec}
button.primary{background:#1a1a1a;color:#fff;border-color:transparent}
button.primary:hover{background:#333}
button.danger{color:#a32d2d;border-color:#f0c0c0}
button.danger:hover{background:#fff5f5}
button.sm{font-size:12px;padding:5px 10px}
input,select{font-family:inherit;font-size:13px;width:100%;padding:8px 11px;border-radius:8px;border:1px solid #d0d0cc;background:#fff;color:#1a1a1a;outline:none}
input:focus,select:focus{border-color:#666}
label{font-size:12px;color:#666;display:block;margin-bottom:4px}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:240px;background:#fff;border-right:1px solid #e5e5e0;display:flex;flex-direction:column;z-index:20}
.sidebar-head{padding:16px;border-bottom:1px solid #e5e5e0}
.sidebar-head h1{font-size:14px;font-weight:700;margin-bottom:12px}
.obra-list{flex:1;overflow-y:auto;padding:8px}
.obra-item{padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#555;display:flex;align-items:center;gap:8px;margin-bottom:2px}
.obra-item:hover{background:#f5f5f3}
.obra-item.active{background:#1a1a1a;color:#fff;font-weight:500}
.obra-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.obra-item.active .obra-dot{background:#4ade80}
.sidebar-foot{padding:12px;border-top:1px solid #e5e5e0}
.main{margin-left:240px;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5e0;padding:13px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.topbar h2{font-size:15px;font-weight:600;flex:1}
.container{max-width:820px;margin:0 auto;padding:20px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:12px 14px}
.stat-n{font-size:22px;font-weight:700}
.stat-l{font-size:11px;color:#888;margin-top:2px}
.alert-mes{background:#FFF8E6;border:1px solid #F5C842;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;margin-bottom:10px;overflow:hidden}
.card-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none}
.card-head:hover{background:#fafaf8}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-sub{font-size:12px;color:#888;margin-top:1px}
.fecha-alta{font-size:11px;color:#aaa;margin-top:2px}
.fecha-alta span{color:#1D9E75;font-weight:500}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
.chevron{font-size:11px;color:#aaa;flex-shrink:0}
.card-body{padding:0 16px 16px;border-top:1px solid #f0f0ec}
.bar-wrap{height:4px;background:#f0f0ec;border-radius:2px;margin:14px 0}
.bar{height:4px;border-radius:2px;transition:width .4s}
.sec-title{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 7px;display:flex;align-items:center;justify-content:space-between}
/* DOCUMENTOS */
.doc-row{display:flex;align-items:center;gap:8px;padding:6px 6px;border-radius:6px;cursor:pointer}
.doc-row:hover{background:#f8f8f5}
.doc-row.na{cursor:default}
.doc-row.na:hover{background:transparent}
.doc-cb{width:17px;height:17px;border:1.5px solid #ccc;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all .1s}
.doc-cb.ok{background:#1D9E75;border-color:#1D9E75}
.doc-cb.na{background:#ccc;border-color:#ccc}
.doc-txt{font-size:13px;color:#555;flex:1;line-height:1.4}
.doc-row.ok .doc-txt{text-decoration:line-through;color:#bbb}
.doc-row.na .doc-txt{font-style:italic;color:#bbb}
.doc-na-btn{font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid #e0e0da;background:#f8f8f5;color:#999;cursor:pointer;font-family:inherit;flex-shrink:0;white-space:nowrap}
.doc-na-btn:hover{background:#f0f0ec;color:#555}
.doc-del-btn{font-size:11px;color:#ddd;cursor:pointer;flex-shrink:0;padding:2px 4px;background:none;border:none}
.doc-del-btn:hover{color:#a32d2d}
.add-doc-row{display:flex;align-items:center;gap:6px;padding:6px 0;margin-top:2px}
.add-doc-input{flex:1;font-size:12px;padding:5px 9px;border-radius:6px;border:1px solid #e0e0da;background:#fafaf8}
.add-doc-input:focus{border-color:#888;outline:none;background:#fff}
/* MENSUAL */
.mes-section{margin-top:8px}
.mes-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.mes-pill{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #e0e0da;background:#f8f8f5;color:#666;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.mes-pill:hover{border-color:#aaa}
.mes-pill.activo{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.mes-pill.ok{background:#d4f5ea;border-color:#1D9E75;color:#1D9E75}
.mes-pill.pend{background:#fff0f0;border-color:#f5c0c0;color:#c04040}
.mes-panel{background:#fafaf8;border:1px solid #e8e8e0;border-radius:10px;padding:12px 14px}
.mes-panel-head{font-size:12px;font-weight:700;color:#555;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.mes-doc-row{display:flex;align-items:center;gap:9px;padding:7px 6px;border-radius:6px;cursor:pointer;border-bottom:1px solid #f0f0ec}
.mes-doc-row:last-child{border-bottom:none}
.mes-doc-row:hover{background:#f0f0ec}
.mes-doc-row.ok .mes-doc-txt{text-decoration:line-through;color:#bbb}
.mes-doc-cb{width:17px;height:17px;border:1.5px solid #ccc;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.mes-doc-cb.ok{background:#1D9E75;border-color:#1D9E75}
.mes-doc-txt{font-size:13px;color:#555;flex:1}
/* ACCIONES */
.card-actions{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid #f0f0ec}
/* EMPTY */
.empty{text-align:center;padding:3rem 1rem;color:#aaa}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.8}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:20px}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.18);max-height:90vh;overflow-y:auto}
.modal h2{font-size:15px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:12px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.tab-bar{display:flex;border-bottom:1px solid #e5e5e0;margin-bottom:14px}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#1a1a1a;font-weight:600;border-bottom-color:#1a1a1a}
.prov-sugg{background:#f8f8f5;border:1px solid #e5e5e0;border-radius:8px;max-height:160px;overflow-y:auto;margin-top:4px;display:none}
.prov-sugg.on{display:block}
.prov-sugg-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f0ec}
.prov-sugg-item:last-child{border-bottom:none}
.prov-sugg-item:hover{background:#f0f0ec}
.prov-g{font-size:11px;color:#aaa}
.prov-sel-box{display:none;background:#f0faf5;border:1px solid #1D9E75;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px}
.no-obra{display:flex;align-items:center;justify-content:center;min-height:80vh}
.no-obra-inner{text-align:center;max-width:320px}
.no-obra-inner h3{font-size:18px;font-weight:700;margin-bottom:8px}
.no-obra-inner p{font-size:13px;color:#888;line-height:1.7;margin-bottom:20px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.note{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:12px 16px;font-size:12px;color:#888;margin-top:12px;line-height:1.7}
/* TRABAJADORES */
.trb-wrap{margin-top:4px}
.trb-card{background:#fff;border:1px solid #e8e8e0;border-radius:10px;margin-bottom:8px;overflow:hidden}
.trb-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;user-select:none}
.trb-head:hover{background:#fafaf8}
.trb-avatar{width:30px;height:30px;border-radius:50%;background:#f0f0ec;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#666;flex-shrink:0}
.trb-info{flex:1;min-width:0}
.trb-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trb-puesto{font-size:11px;color:#aaa}
.trb-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:12px}
.trb-body{padding:8px 12px 12px;border-top:1px solid #f0f0ec}
.trb-add-form{display:flex;gap:6px;margin-top:8px;padding:10px 12px;background:#fafaf8;border:1px dashed #e0e0da;border-radius:10px;flex-wrap:wrap;align-items:flex-end}
.trb-add-form .field-mini{flex:1;min-width:120px}
.trb-add-form label{font-size:11px;color:#888;margin-bottom:3px;display:block}
.trb-add-form input{padding:6px 9px;font-size:12px}
.spinner{width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#1a1a1a;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-head">
    <h1>📋 Subcontratas</h1>
    <button class="primary" id="btn-nueva-obra" style="width:100%;justify-content:center">+ Nueva obra</button>
  </div>
  <div class="obra-list" id="obra-list"></div>
  <div class="sidebar-foot">
    <button id="btn-base-prov" style="width:100%;justify-content:center;font-size:12px;color:#888">👷 Base de proveedores</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h2 id="obra-titulo">Selecciona una obra</h2>
    <div id="topbar-actions"></div>
  </div>
  <div class="container" id="main-content">
    <div class="no-obra">
      <div class="no-obra-inner">
        <div style="font-size:48px;margin-bottom:12px">🏗️</div>
        <h3>Ninguna obra seleccionada</h3>
        <p>Crea tu primera obra en el panel izquierdo.</p>
        <button class="primary" id="btn-primera-obra">+ Crear primera obra</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL OBRA -->
<div class="overlay" id="modal-obra">
  <div class="modal">
    <h2 id="modal-obra-titulo">Nueva obra</h2>
    <div class="field"><label>Nombre *</label><input id="obra-n" placeholder="Ej: Edificio Calle Mayor 12"/></div>
    <div class="field"><label>Dirección</label><input id="obra-dir" placeholder="Calle, número, localidad"/></div>
    <div class="field"><label>Promotor / Cliente</label><input id="obra-prom" placeholder="Nombre del promotor"/></div>
    <div class="field"><label>Fecha de inicio</label><input id="obra-fecha" type="date"/></div>
    <div class="mfoot">
      <button id="btn-cancelar-obra">Cancelar</button>
      <button class="primary" id="btn-guardar-obra">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL PROVEEDOR -->
<div class="overlay" id="modal-prov">
  <div class="modal">
    <h2>Añadir subcontrata</h2>
    <div class="tab-bar">
      <div class="tab active" id="tab-existente">Desde base de datos</div>
      <div class="tab" id="tab-nuevo">Nueva empresa</div>
    </div>
    <div id="panel-existente">
      <div class="field">
        <label>Buscar empresa</label>
        <input id="prov-search" placeholder="Escribe el nombre…" autocomplete="off"/>
        <div class="prov-sugg" id="prov-sugg"></div>
      </div>
      <div class="prov-sel-box" id="prov-sel-box">
        <strong id="prov-sel-nombre"></strong><br>
        <span id="prov-sel-gremio" style="color:#888;font-size:12px"></span>
      </div>
    </div>
    <div id="panel-nuevo" style="display:none">
      <div class="field"><label>Nombre *</label><input id="np-nombre" placeholder="Ej: Instalaciones García S.L."/></div>
      <div class="field"><label>Gremio / actividad</label><input id="np-gremio" placeholder="Electricidad, Fontanería…"/></div>
      <div class="field"><label>Contacto</label><input id="np-contacto" placeholder="Nombre y cargo"/></div>
      <div class="field"><label>Email</label><input id="np-email" type="email" placeholder="email@empresa.com"/></div>
    </div>
    <div class="field"><label>Fecha de alta en esta obra *</label><input id="prov-fecha-alta" type="date"/></div>
    <div class="mfoot">
      <button id="btn-cancelar-prov">Cancelar</button>
      <button class="primary" id="btn-guardar-prov">Añadir a la obra</button>
    </div>
  </div>
</div>

<!-- MODAL BASE PROVEEDORES -->
<div class="overlay" id="modal-base">
  <div class="modal">
    <h2>Base de proveedores</h2>
    <p style="font-size:12px;color:#888;margin-bottom:14px">Todas las empresas registradas en el sistema.</p>
    <div id="base-prov-lista" style="max-height:340px;overflow-y:auto"></div>
    <div class="mfoot"><button id="btn-cerrar-base">Cerrar</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONSTANTES
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzdJDNm_ImXIJN0-DKsSXbLnKkkHo9g9zOLRmheM347FYnKib9EM5MkSU3MJpH0t2Yg/exec';

const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const HOY = new Date();
const MES_ACT = HOY.getMonth();
const ANO_ACT = HOY.getFullYear();
const MES_LABEL = MESES[MES_ACT] + ' ' + ANO_ACT;

const DOCS_EMP = [
  'Escritura de constitución y poderes del representante legal',
  'CIF de la empresa',
  'Alta en el IAE (epígrafe correspondiente)',
  'Póliza de Responsabilidad Civil vigente y último recibo',
  'Póliza Seguro de Convenio (accidentes/vida) y último recibo',
  'Adhesión a la Mutua Colaboradora con la Seguridad Social',
  'REA (Registro de Empresas Acreditadas) en vigor',
  'Evaluación de Riesgos y Planificación Actividad Preventiva',
  'Modalidad preventiva acreditada (SPP, SPA o mancomunado)',
  'Plan de Seguridad y Salud / adhesión al plan del contratista',
  'Certificado aprobación PSS por Coordinación de Seguridad'
];
const DOCS_TRB = [
  'DNI / NIE en vigor',
  'Contrato de trabajo en vigor y categoría profesional',
  'Certificado de aptitud médica vigente',
  'Ficha de entrega de EPIs firmada por el trabajador',
  'Formación PRL mínimo 20 h (Convenio Construcción)',
  'Formación específica trabajos especiales (si procede)',
  'Acreditación Recurso Preventivo (si aplica)',
  'Tarjeta Profesional de la Construcción (TPC) en vigor',
  'Acuse recibo Art. 18 LPRL — información riesgos de la obra',
  'Acuse recibo Art. 19 LPRL — formación e instrucciones de seguridad'
];
const DOCS_MAQ = [
  'Ficha técnica, marcado CE y declaración de conformidad CE',
  'Certificado última revisión / ITV y seguro del equipo vigente',
  'Certificado de operador / carnet del trabajador que lo maneja'
];
const DOCS_MEN = [
  'Certificado TGSS corriente de pago — mes en curso',
  'Certificado corriente de pago AEAT',
  'RNT (Relación Nominal de Trabajadores) mes anterior',
  'RLC (Recibo de Liquidación de Cotizaciones) mes anterior',
  'Justificante pago cotizaciones SS (ITA) mes anterior',
  'Partes de presencia — trabajadores en obra mes anterior',
  'Justificante de pago de salarios mes anterior',
  'Acta de charla / reunión de seguridad',
  'Registro de inspecciones de equipos y maquinaria'
];

const SECCIONES = [
  {id:'emp', label:'📁 Documentación de empresa', docs: DOCS_EMP},
  {id:'maq', label:'🏗️ Maquinaria y equipos', docs: DOCS_MAQ}
];

const PAL = [
  ['#185FA5','#ddeeff'],['#1D9E75','#d4f5ea'],['#993C1D','#fce8e0'],
  ['#534AB7','#eceafc'],['#3B6D11','#e4f2d4'],['#BA7517','#fef3d4'],['#993556','#fce8f0']
];

// ============================================================
// ESTADO
// ============================================================
let db = {obras:[], proveedores:[]};
let obraActual = null;
let tabProv = 'existente';
let provSelId = null;
let obraEditId = null;
let subEditId = null;
let mesVisto = {}; // {subId: 'ANO_MES'}

// ============================================================
// PERSISTENCIA
// ============================================================
async function cargarDB() {
  try {
    const r = await fetch(API_URL + '?action=load');
    const text = await r.text();
    const parsed = JSON.parse(text);
    if (parsed && parsed.obras) { db = parsed; return; }
  } catch(e) { console.warn('Sheets error:', e); }
  try {
    const s = localStorage.getItem('gestor_v5');
    if (s) db = JSON.parse(s);
  } catch(e) {}
  if (!db.obras) db.obras = [];
  if (!db.proveedores) db.proveedores = [];
}

async function guardarDB() {
  try { localStorage.setItem('gestor_v5', JSON.stringify(db)); } catch(e) {}
  try {
    await fetch(API_URL, { method:'POST', body: JSON.stringify(db) });
  } catch(e) {
    toast('⚠️ Sin conexión — guardado local');
  }
}

// ============================================================
// UTILIDADES
// ============================================================
function mesKey(ano, mes) { return ano + '_' + mes; }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2400);
}

function initSub() {
  const checks = {};
  DOCS_EMP.forEach(d => checks[d] = 'pend');
  DOCS_MAQ.forEach(d => checks[d] = 'pend');
  return {
    checks,        // pend | ok | na
    checksM: {},   // {doc: {ANO_MES: bool}}
    extras: {},    // {secId: [texto,...]}
    trabajadores: [], // [{id, nombre, puesto, fechaAlta, checks}]
    open: true
  };
}

function initTrabajador(nombre, puesto, fechaAlta) {
  const checks = {};
  DOCS_TRB.forEach(d => checks[d] = 'pend');
  return {
    id: '' + Date.now() + Math.random().toString(36).slice(2,6),
    nombre: nombre || '',
    puesto: puesto || '',
    fechaAlta: fechaAlta || new Date().toISOString().split('T')[0],
    checks,   // pend | ok | na
    extras: [], // docs extra para este trabajador
    open: false
  };
}

function getPal(idx) { return PAL[idx % PAL.length]; }

function getIni(nombre) {
  return (nombre||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
}

function calcStats(sub) {
  let total = 0, ok = 0;
  // Docs empresa + maquinaria
  Object.entries(sub.checks).forEach(([k,v]) => {
    if (v === 'na') return;
    total++; if (v === 'ok') ok++;
  });
  // Extras de secciones
  Object.values(sub.extras || {}).forEach(arr => {
    arr.forEach(doc => {
      const key = 'X:' + doc;
      if (sub.checks[key] === 'na') return;
      total++; if (sub.checks[key] === 'ok') ok++;
    });
  });
  // Trabajadores
  (sub.trabajadores || []).forEach(trb => {
    Object.entries(trb.checks).forEach(([k,v]) => {
      if (v === 'na') return;
      total++; if (v === 'ok') ok++;
    });
    (trb.extras || []).forEach(doc => {
      const key = 'XT:' + doc;
      if (trb.checks[key] === 'na') return;
      total++; if (trb.checks[key] === 'ok') ok++;
    });
  });
  // Trabajadores
  (sub.trabajadores || []).forEach(trb => {
    Object.entries(trb.checks).forEach(([k,v]) => {
      if (v === 'na') return;
      total++; if (v === 'ok') ok++;
    });
    (trb.extras || []).forEach(doc => {
      const key = 'XT:' + doc;
      if (trb.checks[key] === 'na') return;
      total++; if (trb.checks[key] === 'ok') ok++;
    });
  });
  // Mensual mes actual
  const mk = mesKey(ANO_ACT, MES_ACT);
  let mOk = 0;
  DOCS_MEN.forEach(d => { if (sub.checksM[d]?.[mk]) mOk++; });
  return { ok, total, mOk, mTotal: DOCS_MEN.length };
}

function colorPct(pct) {
  if (pct === 100) return ['#1D9E75','#d4f5ea'];
  if (pct > 0)    return ['#EF9F27','#fef3d4'];
  return                  ['#E24B4A','#fce8e8'];
}

function mesesDesdeAlta(sub) {
  const fa = sub.fechaAlta ? new Date(sub.fechaAlta) : new Date();
  const lista = [];
  let a = fa.getFullYear(), m = fa.getMonth();
  while (a < ANO_ACT || (a === ANO_ACT && m <= MES_ACT)) {
    lista.push({ano:a, mes:m, label: MESES[m] + (a !== ANO_ACT ? ' ' + a : '')});
    m++; if (m > 11) { m = 0; a++; }
  }
  return lista;
}

function renderSidebar() {

  actions.appendChild(btnAdd);

  // Stats

  (obra.subcontratas || []).forEach(sub => {

    const pct = st.total ? Math.round(st.ok / st.total * 100) : 0;
    const mPct = Math.round(st.mOk / st.mTotal * 100);
    if (pct === 100 && mPct === 100) alDia++;
    else incompletas++;
    totalOk += st.ok + st.mOk;
    totalPos += st.total + st.mTotal;
  });
  const pctGlobal = totalPos ? Math.round(totalOk / totalPos * 100) : 0;

  // Alerta mes
  const hayMesPend = (obra.subcontratas || []).some(sub => {
    return DOCS_MEN.some(d => !sub.checksM[d]?.[mk]);

    const al = document.createElement('div');

    '<div class="stat"><div class="stat-n" style="color:#1D9E75">' + alDia + '</div><div class="stat-l">Al día</div></div>' +
    '<div class="stat"><div class="stat-n" style="color:#EF9F27">' + incompletas + '</div><div class="stat-l">Incompletas</div></div>' +
    '<div class="stat"><div class="stat-n">' + pctGlobal + '%</div><div class="stat-l">Completado</div></div>';

    content.appendChild(emp);
  } else {
    (obra.subcontratas || []).forEach((sub, si) => {
      content.appendChild(buildCard(sub, si, obra));
    });
  }

  nota.className = 'note';
  nota.textContent = '💡 Los datos se guardan en la nube y son accesibles desde cualquier ordenador. Para revisar un documento escaneado súbelo en el chat de Claude.';
  content.appendChild(nota);
}

  });

  // CUERPO

  body.appendChild(barWrap);

  body.appendChild(buildSeccion(sub, SECCIONES[0], obra));

  body.appendChild(buildTrabajadores(sub));

function buildSeccion(sub, sec, obra) {
  const wrap = document.createElement('div');

  const title = document.createElement('div');
  title.className = 'sec-title';
  title.textContent = sec.label;
  wrap.appendChild(title);

  // Docs estándar
  sec.docs.forEach(doc => {
    wrap.appendChild(buildDocRow(sub, doc, null));
  });

  // Docs extra de esta sección
  const extras = sub.extras?.[sec.id] || [];
  extras.forEach(txt => {
    wrap.appendChild(buildDocRow(sub, txt, sec.id));
  });

  // Añadir doc personalizado
  const addRow = document.createElement('div');
  addRow.className = 'add-doc-row';
  const inp = document.createElement('input');
  inp.className = 'add-doc-input';
  inp.placeholder = '+ Añadir documento personalizado…';
  const btnAdd = document.createElement('button');
  btnAdd.className = 'sm'; btnAdd.textContent = 'Añadir';
  const doAdd = async () => {
    const txt = inp.value.trim();
    if (!txt) return;
    if (!sub.extras) sub.extras = {};
    if (!sub.extras[sec.id]) sub.extras[sec.id] = [];
    if (sub.extras[sec.id].includes(txt)) { toast('Ya existe este documento'); return; }
    sub.extras[sec.id].push(txt);
    sub.checks['X:' + txt] = 'pend';
    await guardarDB();
    renderMain();
  };
  btnAdd.addEventListener('click', doAdd);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });
  addRow.appendChild(inp);
  addRow.appendChild(btnAdd);
  wrap.appendChild(addRow);

  return wrap;
}

function buildDocRow(sub, doc, extraSecId) {
  const isExtra = extraSecId !== null;
  const key = isExtra ? 'X:' + doc : doc;
  const estado = sub.checks[key] || 'pend';

  const row = document.createElement('div');
  row.className = 'doc-row' + (estado === 'ok' ? ' ok' : estado === 'na' ? ' na' : '');

  const cb = document.createElement('div');
  cb.className = 'doc-cb' + (estado === 'ok' ? ' ok' : estado === 'na' ? ' na' : '');
  cb.textContent = estado === 'ok' ? '✓' : estado === 'na' ? '—' : '';

  const txt = document.createElement('span');
  txt.className = 'doc-txt';
  txt.textContent = doc;

  const btnNa = document.createElement('button');
  btnNa.className = 'doc-na-btn';
  btnNa.textContent = estado === 'na' ? 'Reactivar' : 'No aplica';

  // Click en la fila = toggle ok/pend (no si es na)
  row.addEventListener('click', async (e) => {
    if (e.target === btnNa) return;
    if (estado === 'na') return;
    sub.checks[key] = estado === 'ok' ? 'pend' : 'ok';
    await guardarDB();
    renderMain();
  });

  btnNa.addEventListener('click', async (e) => {
    e.stopPropagation();
    sub.checks[key] = estado === 'na' ? 'pend' : 'na';
    await guardarDB();
    renderMain();
  });

  row.appendChild(cb);
  row.appendChild(txt);

  if (isExtra) {
    const btnDel = document.createElement('button');
    btnDel.className = 'doc-del-btn'; btnDel.textContent = '✕'; btnDel.title = 'Eliminar';
    btnDel.addEventListener('click', async (e) => {
      e.stopPropagation();
      sub.extras[extraSecId] = sub.extras[extraSecId].filter(d => d !== doc);
      delete sub.checks[key];
      await guardarDB();
      renderMain();
    });
    row.appendChild(btnDel);
  }

  row.appendChild(btnNa);
  return row;
}

function buildMensual(sub) {
  const wrap = document.createElement('div');
  wrap.className = 'mes-section';

  const meses = mesesDesdeAlta(sub);
  if (!meses.length) return wrap;

  const mk = mesKey(ANO_ACT, MES_ACT);
  if (!mesVisto[sub.id]) mesVisto[sub.id] = mk;
  const mesActivoKey = mesVisto[sub.id];
  const mesActivo = meses.find(m => mesKey(m.ano, m.mes) === mesActivoKey) || meses[meses.length-1];

  // Título sección
  const mOk = DOCS_MEN.filter(d => sub.checksM[d]?.[mk]).length;
  const titleEl = document.createElement('div');
  titleEl.className = 'sec-title';
  const badgeCol = mOk === DOCS_MEN.length ? '#1D9E75' : '#E24B4A';
  const badgeBg  = mOk === DOCS_MEN.length ? '#d4f5ea' : '#fce8e8';
  titleEl.innerHTML = '<span>📅 Documentación mensual</span>' +
    '<span style="font-size:10px;padding:2px 8px;border-radius:8px;background:' + badgeBg + ';color:' + badgeCol + ';font-weight:700">' +
    MES_LABEL + ': ' + mOk + '/' + DOCS_MEN.length + '</span>';
  wrap.appendChild(titleEl);

  // Pills de meses
  const selector = document.createElement('div');
  selector.className = 'mes-selector';
  meses.forEach(({ano, mes, label}) => {
    const key = mesKey(ano, mes);
    const docsOk = DOCS_MEN.filter(d => sub.checksM[d]?.[key]).length;
    const allOk = docsOk === DOCS_MEN.length;
    const esMesAct = ano === ANO_ACT && mes === MES_ACT;
    const isActivo = key === mesActivoKey;

    const pill = document.createElement('button');
    pill.className = 'mes-pill' + (isActivo ? ' activo' : allOk ? ' ok' : esMesAct ? ' pend' : '');
    pill.textContent = label + ' ' + (allOk ? '✓' : docsOk + '/' + DOCS_MEN.length);
    pill.addEventListener('click', () => {
      mesVisto[sub.id] = key;
      renderMain();
    });
    selector.appendChild(pill);
  });
  wrap.appendChild(selector);

  // Panel del mes seleccionado
  const {ano, mes, label} = mesActivo;
  const panelKey = mesKey(ano, mes);
  const panelOk = DOCS_MEN.filter(d => sub.checksM[d]?.[panelKey]).length;

  const panel = document.createElement('div');
  panel.className = 'mes-panel';

  const panHead = document.createElement('div');
  panHead.className = 'mes-panel-head';
  const pcol = panelOk === DOCS_MEN.length ? '#1D9E75' : '#EF9F27';
  panHead.innerHTML = '<span>📅 ' + label + '</span><span style="color:' + pcol + '">' + panelOk + '/' + DOCS_MEN.length + ' recibidos</span>';
  panel.appendChild(panHead);

  DOCS_MEN.forEach(doc => {
    const on = !!sub.checksM[doc]?.[panelKey];
    const drow = document.createElement('div');
    drow.className = 'mes-doc-row' + (on ? ' ok' : '');

    const dcb = document.createElement('div');
    dcb.className = 'mes-doc-cb' + (on ? ' ok' : '');
    dcb.textContent = on ? '✓' : '';

    const dtxt = document.createElement('span');
    dtxt.className = 'mes-doc-txt';
    dtxt.textContent = doc;

    drow.appendChild(dcb);
    drow.appendChild(dtxt);

    drow.addEventListener('click', async () => {
      if (!sub.checksM[doc]) sub.checksM[doc] = {};
      sub.checksM[doc][panelKey] = !sub.checksM[doc][panelKey];
      await guardarDB();
      renderMain();
    });

    panel.appendChild(drow);
  });

  wrap.appendChild(panel);
  return wrap;
}

// ============================================================
// MODALES
// ============================================================
function cerrarModales() {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('on'));
  obraEditId = null; subEditId = null; provSelId = null;
}

// Cerrar al click fuera
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) cerrarModales(); });
});

// MODAL OBRA
function abrirModalObra(id) {
  obraEditId = id;
  const modal = document.getElementById('modal-obra');
  document.getElementById('modal-obra-titulo').textContent = id ? 'Editar obra' : 'Nueva obra';
  if (id) {
    const o = db.obras.find(x => x.id === id);
    document.getElementById('obra-n').value = o.nombre;
    document.getElementById('obra-dir').value = o.direccion||'';
    document.getElementById('obra-prom').value = o.promotor||'';
    document.getElementById('obra-fecha').value = o.fecha||'';
  } else {
    ['obra-n','obra-dir','obra-prom','obra-fecha'].forEach(i => document.getElementById(i).value = '');
  }
  modal.classList.add('on');
  setTimeout(() => document.getElementById('obra-n').focus(), 80);
}

async function guardarObra() {
  const n = document.getElementById('obra-n').value.trim();
  if (!n) { document.getElementById('obra-n').focus(); return; }
  if (obraEditId) {
    const o = db.obras.find(x => x.id === obraEditId);
    o.nombre = n;
    o.direccion = document.getElementById('obra-dir').value.trim();
    o.promotor = document.getElementById('obra-prom').value.trim();
    o.fecha = document.getElementById('obra-fecha').value;
    toast('Obra actualizada ✓');
  } else {
    const nueva = {
      id: '' + Date.now(),
      nombre: n,
      direccion: document.getElementById('obra-dir').value.trim(),
      promotor: document.getElementById('obra-prom').value.trim(),
      fecha: document.getElementById('obra-fecha').value,
      subcontratas: []
    };
    db.obras.push(nueva);
    obraActual = nueva.id;
    toast('Obra creada ✓');
  }
  cerrarModales();
  await guardarDB();
  renderSidebar();
  renderMain();
}

// MODAL PROVEEDOR
function abrirModalProv() {
  tabProv = 'existente'; provSelId = null;
  ['np-nombre','np-gremio','np-contacto','np-email','prov-search'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('prov-sel-box').style.display = 'none';
  document.getElementById('prov-sugg').classList.remove('on');
  document.getElementById('prov-fecha-alta').value = new Date().toISOString().split('T')[0];
  switchTabProv('existente');
  document.getElementById('modal-prov').classList.add('on');
  setTimeout(() => document.getElementById('prov-search').focus(), 80);
}

function switchTabProv(tab) {
  tabProv = tab;
  document.getElementById('tab-existente').className = 'tab' + (tab==='existente'?' active':'');
  document.getElementById('tab-nuevo').className = 'tab' + (tab==='nuevo'?' active':'');
  document.getElementById('panel-existente').style.display = tab==='existente' ? '' : 'none';
  document.getElementById('panel-nuevo').style.display = tab==='nuevo' ? '' : 'none';
}

function filtrarProveedores() {
  const q = document.getElementById('prov-search').value.trim().toLowerCase();
  const obra = db.obras.find(x => x.id === obraActual);
  const yaEnObra = new Set((obra?.subcontratas||[]).map(s => s.provId));
  const res = db.proveedores.filter(p =>
    !yaEnObra.has(p.id) &&
    (p.nombre.toLowerCase().includes(q) || (p.gremio||'').toLowerCase().includes(q))
  );
  const sugg = document.getElementById('prov-sugg');
  if (!res.length && !q) { sugg.classList.remove('on'); return; }
  sugg.classList.add('on');
  sugg.innerHTML = '';
  if (!res.length) {
    sugg.innerHTML = '<div class="prov-sugg-item" style="color:#aaa">Sin resultados</div>';
    return;
  }
  res.forEach(p => {
    const item = document.createElement('div');
    item.className = 'prov-sugg-item';
    item.innerHTML = p.nombre + '<div class="prov-g">' + (p.gremio||'') + '</div>';
    item.addEventListener('click', () => {
      provSelId = p.id;
      document.getElementById('prov-search').value = p.nombre;
      document.getElementById('prov-sel-nombre').textContent = p.nombre;
      document.getElementById('prov-sel-gremio').textContent = p.gremio||'';
      document.getElementById('prov-sel-box').style.display = 'block';
      sugg.classList.remove('on');
    });
    sugg.appendChild(item);
  });
}

async function guardarProveedorEnObra() {
  const obra = db.obras.find(x => x.id === obraActual);
  if (!obra) return;
  const fechaAlta = document.getElementById('prov-fecha-alta').value;
  if (!fechaAlta) { document.getElementById('prov-fecha-alta').focus(); return; }

  let provId;
  if (tabProv === 'existente') {
    if (!provSelId) { toast('Selecciona una empresa de la lista'); return; }
    provId = provSelId;
  } else {
    const nombre = document.getElementById('np-nombre').value.trim();
    if (!nombre) { document.getElementById('np-nombre').focus(); return; }
    const ci = db.proveedores.length;
    const nuevo = {
      id: '' + Date.now(),
      nombre,
      gremio: document.getElementById('np-gremio').value.trim(),
      contacto: document.getElementById('np-contacto').value.trim(),
      email: document.getElementById('np-email').value.trim(),
    };
    db.proveedores.push(nuevo);
    provId = nuevo.id;
  }

  const sub = { id: '' + Date.now() + 'x', provId, fechaAlta, ...initSub() };
  obra.subcontratas.push(sub);
  cerrarModales();
  await guardarDB();
  renderMain();
  toast('Subcontrata añadida ✓');
}

function abrirEditarSub(subId) {
  subEditId = subId;
  const obra = db.obras.find(x => x.id === obraActual);
  const sub = obra.subcontratas.find(s => s.id === subId);
  const prov = db.proveedores.find(p => p.id === sub.provId);
  if (!prov) return;
  switchTabProv('nuevo');
  document.getElementById('np-nombre').value = prov.nombre;
  document.getElementById('np-gremio').value = prov.gremio||'';
  document.getElementById('np-contacto').value = prov.contacto||'';
  document.getElementById('np-email').value = prov.email||'';
  document.getElementById('prov-fecha-alta').value = sub.fechaAlta||'';
  document.getElementById('modal-prov').classList.add('on');
}

async function quitarSub(subId, obra) {
  if (!confirm('¿Quitar esta subcontrata de la obra?')) return;
  obra.subcontratas = obra.subcontratas.filter(s => s.id !== subId);
  await guardarDB();
  renderMain();
  toast('Subcontrata eliminada');
}

// BASE PROVEEDORES
function abrirBaseProv() {
  const lista = document.getElementById('base-prov-lista');
  lista.innerHTML = '';
  if (!db.proveedores.length) {
    lista.innerHTML = '<p style="font-size:13px;color:#aaa;text-align:center;padding:20px">Sin proveedores registrados</p>';
  } else {
    db.proveedores.forEach(p => {
      const div = document.createElement('div');
      div.style.cssText = 'padding:9px 0;border-bottom:1px solid #f0f0ec';
      div.innerHTML = '<div style="font-size:13px;font-weight:600">' + p.nombre + '</div>' +
        '<div style="font-size:12px;color:#888">' + (p.gremio||'') + (p.contacto?' · '+p.contacto:'') + '</div>' +
        '<div style="font-size:11px;color:#aaa">' + (p.email||'') + '</div>';
      lista.appendChild(div);
    });
  }
  document.getElementById('modal-base').classList.add('on');
}

// ============================================================
// EVENT LISTENERS ESTÁTICOS
// ============================================================
document.getElementById('btn-nueva-obra').addEventListener('click', () => abrirModalObra(null));
document.getElementById('btn-primera-obra')?.addEventListener('click', () => abrirModalObra(null));
document.getElementById('btn-cancelar-obra').addEventListener('click', cerrarModales);
document.getElementById('btn-guardar-obra').addEventListener('click', guardarObra);
document.getElementById('btn-cancelar-prov').addEventListener('click', cerrarModales);
document.getElementById('btn-guardar-prov').addEventListener('click', () => {
  if (subEditId) {
    // modo edición
    const obra = db.obras.find(x => x.id === obraActual);
    const sub = obra.subcontratas.find(s => s.id === subEditId);
    const prov = db.proveedores.find(p => p.id === sub.provId);
    if (prov) {
      prov.nombre = document.getElementById('np-nombre').value.trim() || prov.nombre;
      prov.gremio = document.getElementById('np-gremio').value.trim();
      prov.contacto = document.getElementById('np-contacto').value.trim();
      prov.email = document.getElementById('np-email').value.trim();
    }
    sub.fechaAlta = document.getElementById('prov-fecha-alta').value || sub.fechaAlta;
    subEditId = null;
    cerrarModales();
    guardarDB().then(() => { renderMain(); toast('Datos actualizados ✓'); });
  } else {
    guardarProveedorEnObra();
  }
});
document.getElementById('tab-existente').addEventListener('click', () => switchTabProv('existente'));
document.getElementById('tab-nuevo').addEventListener('click', () => switchTabProv('nuevo'));
document.getElementById('prov-search').addEventListener('input', filtrarProveedores);
document.getElementById('btn-base-prov').addEventListener('click', abrirBaseProv);
document.getElementById('btn-cerrar-base').addEventListener('click', cerrarModales);

// ============================================================
// ALERTA CAMBIO DE MES
// ============================================================
function checkCambioMes() {
  const saved = localStorage.getItem('ultimo_mes');
  const actual = mesKey(ANO_ACT, MES_ACT);
  if (saved && saved !== actual) {
    setTimeout(() => alert('📅 Cambio de mes detectado.\n\n¡Recuerda solicitar la documentación mensual de ' + MES_LABEL + ' a todas las subcontratas!'), 800);
  }
  localStorage.setItem('ultimo_mes', actual);
}

// ============================================================
// INIT
// ============================================================
(async () => {
  document.getElementById('main-content').innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px">' +
    '<div class="spinner"></div><div style="font-size:13px;color:#aaa">Cargando datos…</div></div>';
  await cargarDB();
  checkCambioMes();
  if (db.obras.length) obraActual = db.obras[0].id;
  renderSidebar();
  renderMain();
})();
</script>
